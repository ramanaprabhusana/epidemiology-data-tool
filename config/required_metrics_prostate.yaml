      - "very elderly"
      - "elderly 75+"

  # ─── Stage-specific survival ─────────────────────────────────
  - id: survival_localized
    label: "5-year survival - Localized (%)"
    required: false
    splits: []
    excel_metric_id: "pca_survival_localized_pct"

# Required epidemiology metrics for Prostate Cancer (adenocarcinoma + advanced CRPC)
# Aligns with InsightACE Epidemiology Beta and project scope.
# Generated: 2026-04-15 as part of multi-indication Data Pipeline extension.

indication: "Prostate"

metrics:
  # ─── Core epidemiology (male only) ───
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k, male)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k, male)"
    required: true
    splits: []
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []

  # ─── Stage distribution (SEER Summary Stage) ───
  - id: stage_localized
    label: "Localized (%)"
    required: true
    splits: []
  - id: stage_regional
    label: "Regional (%)"
    required: true
    splits: []
  - id: stage_distant
    label: "Distant / Metastatic (%)"
    required: true
    splits: []

  # ─── Stage-specific survival ───
  - id: survival_localized
    label: "5-year survival — Localized (%)"
    required: false
    splits: []
  - id: survival_distant
    label: "5-year survival — Distant (%)"
    required: false
    splits: []

  # ─── Risk stratification (NCCN) ───
  - id: risk_low
    label: "Low risk (%)"
    required: false
    splits: []
  - id: risk_intermediate
    label: "Intermediate risk (%)"
    required: false
    splits: []
  - id: risk_high
    label: "High / very-high risk (%)"
    required: false
    splits: []

  # ─── Treatment cascade ───
  - id: active_surveillance
    label: "Active Surveillance (%)"
    required: false
    splits: ["by_line"]
  - id: definitive_local_tx
    label: "Definitive Local Tx (Surgery / RT)"
    required: false
    splits: ["by_line"]
  - id: bcr_adt
    label: "BCR → ADT"
    required: false
    splits: ["by_line"]
  - id: mcspc
    label: "mCSPC (Metastatic Castration-Sensitive)"
    required: false
    splits: ["by_line"]
  - id: nmcrpc_mcrpc_1l_2l
    label: "nmCRPC / mCRPC 1L–2L (AR inhibitors, chemo, Lu-PSMA)"
    required: false
    splits: ["by_line"]
  - id: late_line_mcrpc
    label: "Late-line mCRPC"
    required: false
    splits: ["by_line"]

  # ─── Biomarkers / genetics ───
  - id: hrr_mutation_rate
    label: "HRR mutation (% incl. BRCA1/2)"
    required: false
    splits: []
  - id: psma_positive
    label: "PSMA PET positive (%)"
    required: false
    splits: []

year_range:
  min: 2015
  max: 2029

geography: "US"

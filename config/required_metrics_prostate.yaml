# Required epidemiology metrics for Prostate Cancer (adenocarcinoma + advanced CRPC)
# Aligns with InsightACE Epidemiology Beta + Excel v6 one-stop model.
# Updated 2026-04-29: added all proportion/cascade/age/biomarker metrics
# that drive the Prostate Forecast sheet IFERROR(INDEX/MATCH) formulas.

indication: "Prostate"

metrics:
  # ─── Core epidemiology (male only, required) ─────────────────
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k, male)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k, male)"
    required: true
    splits: []
  - id: mortality_rate_aapc
    label: "Mortality Rate AAPC"
    required: true
    splits: []
    synonyms:
      - "mortality annual percent change"
      - "mortality APC"
      - "mortality trend"
      - "joinpoint mortality"
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []

  # ─── Stage distribution (SEER Summary Stage) ─────────────────
  - id: stage_localized
    label: "Localized (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "pc_localized_pct"
    evidence_ids:
      - "stage_localized_pct"
      - "stage_localized_2017"
    synonyms:
      - "localized prostate"
      - "organ-confined prostate"
      - "local stage prostate"
      - "SEER local prostate"
  - id: stage_regional
    label: "Regional (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "pc_regional_pct"
    evidence_ids:
      - "stage_regional_pct"
      - "stage_regional_2017"
    synonyms:
      - "regional prostate"
      - "node positive prostate"
      - "regional spread prostate"
      - "SEER regional prostate"
  - id: stage_distant
    label: "Distant / Metastatic (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "pc_distant_pct"
    evidence_ids:
      - "stage_distant_pct"
      - "stage_distant_2017"
    synonyms:
      - "distant prostate"
      - "metastatic prostate cancer"
      - "stage IV prostate"
      - "SEER distant prostate"
      - "advanced prostate"

  # ─── Age distribution ────────────────────────────────────────
  - id: age_lt65_pct
    label: "Age <65 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "pc_age_lt65_pct"
    evidence_ids:
      - "age_distribution_Under_40"
      - "age_distribution_40to54"
    synonyms:
      - "younger than 65"
      - "under 65"
      - "age less than 65"
      - "<65 years old"
  - id: age_65_74_pct
    label: "Age 65-74 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "pc_age_65_74_pct"
    evidence_ids:
      - "age_distribution_65to74"
    synonyms:
      - "65 to 74 years"
      - "age 65-74"
      - "elderly 65-74"
  - id: age_75plus_pct
    label: "Age 75+ years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "pc_age_75plus_pct"
    evidence_ids:

# Required epidemiology metrics for Hodgkin Lymphoma (HL)
# Aligns with InsightACE Epidemiology Beta + Excel v6 one-stop model.
# Updated 2026-04-29: added all proportion/cascade/age metrics
# that drive the Hodgkin Forecast sheet IFERROR(INDEX/MATCH) formulas.

indication: "Hodgkin Lymphoma"

metrics:
  # ─── Core epidemiology (required) ───────────────────────────
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k)"
    required: true
    splits: []
  - id: mortality_rate_aapc
    label: "Mortality Rate AAPC"
    required: true
    splits: []
    synonyms:
      - "mortality annual percent change"
      - "mortality APC"
      - "mortality trend"
      - "joinpoint mortality"
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []
  - id: male_female_ratio
    label: "Male:Female Ratio"
    required: true
    splits: []

  # ─── Stage distribution (Ann Arbor / Lugano) ─────────────────
  - id: stage_i_pct
    label: "Stage I (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "hl_stage_i_pct"
    evidence_ids:
      - "stage_i_pct_2017"
      - "stage_i_pct_2013"
      - "stage_i_pct_2009"
    synonyms:
      - "stage I"
      - "stage 1"
      - "Ann Arbor stage I"
      - "Lugano stage I"
      - "early-stage Hodgkin stage I"
  - id: stage_ii_pct
    label: "Stage II (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "hl_stage_ii_pct"
    evidence_ids:
      - "stage_ii_pct_2017"
      - "stage_ii_pct_2013"
    synonyms:
      - "stage II"
      - "stage 2"
      - "Ann Arbor stage II"
      - "Lugano stage II"
  - id: stage_iii_pct
    label: "Stage III (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "hl_stage_iii_pct"
    evidence_ids:

    synonyms:
      - "stage IV"
      - "stage 4"
      - "Ann Arbor stage IV"
      - "advanced Hodgkin"
      - "metastatic Hodgkin"

  # ─── Age distribution ────────────────────────────────────────
  # Standard SEER-style buckets (kept for backwards compatibility)
  - id: age_lt65_pct
    label: "Age <65 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "hl_age_lt65_pct"
    evidence_ids:
      - "age_distribution_20to34"
      - "age_distribution_35to44"

# Required epidemiology metrics for GC (Gastric Cancer, Stomach Cancer)
# Aligns with InsightACE Epidemiology Beta + Excel v6 one-stop model.
# Updated 2026-04-29: added all proportion/cascade/age metrics
# that drive the Gastric Forecast sheet IFERROR(INDEX/MATCH) formulas.

indication: "Gastric"

metrics:
  # ─── Core epidemiology (required) ───────────────────────────
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k)"
    required: true
    splits: []
  - id: mortality_rate_aapc
    label: "Mortality Rate AAPC"
    required: true
    splits: []
    synonyms:
      - "mortality annual percent change"
      - "mortality APC"
      - "mortality trend"
      - "joinpoint mortality"
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []
  - id: male_female_ratio
    label: "Male:Female Ratio"
    required: true
    splits: []

  # ─── Stage distribution (SEER Summary Stage) ─────────────────
  - id: stage_localized
    label: "Localized (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "gc_localized_pct"
    evidence_ids:
      - "stage_localized_pct"
      - "stage_localized_2017"
    synonyms:
      - "localized gastric"
      - "local disease"
      - "organ-confined stomach cancer"
      - "SEER local"
  - id: stage_regional
    label: "Regional (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "gc_regional_pct"
    evidence_ids:
      - "stage_regional_pct"
      - "stage_regional_2017"
    synonyms:
      - "regional gastric"
      - "regional spread"
      - "node positive gastric"
      - "SEER regional"
  - id: stage_distant
    label: "Distant / Metastatic (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "gc_distant_pct"
    evidence_ids:
      - "stage_distant_pct"
      - "stage_distant_2017"
    synonyms:
      - "distant metastases"
      - "metastatic gastric"
      - "stage IV gastric"
      - "SEER distant"
      - "advanced gastric cancer"

  # ─── Age distribution ────────────────────────────────────────
  - id: age_lt65_pct
    label: "Age <65 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "gc_age_lt40_pct"
    evidence_ids:
      - "age_distribution_20to34"
      - "age_distribution_35to44"
    synonyms:
      - "younger than 65"
      - "under 65"
      - "age less than 65"
      - "<65 years old"
  - id: age_65_74_pct
    label: "Age 65-74 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "gc_age_65plus_pct"
    evidence_ids:
      - "age_distribution_65to74"
    synonyms:
      - "65 to 74 years"
      - "age 65-74"
      - "elderly 65-74"
  - id: age_75plus_pct
    label: "Age 75+ years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "gc_age_65plus_pct"
    evidence_ids:
      - "age_distribution_75to84"
    synonyms:
      - "75 and older"
      - "age 75+"
      - "very elderly"
      - "elderly 75+"

  # ─── Stage-specific survival ─────────────────────────────────
  - id: survival_localized
    label: "5-year survival - Localized (%)"
    required: false
    splits: []
    excel_metric_id: "gc_survival_localized_pct"
    synonyms:
      - "localized survival"
      - "5-year survival localized gastric"
  - id: survival_regional
    label: "5-year survival - Regional (%)"
    required: false
    splits: []
    excel_metric_id: "gc_survival_regional_pct"
    synonyms:
      - "regional survival"
      - "5-year survival regional gastric"
  - id: survival_distant
    label: "5-year survival - Distant (%)"
    required: false
    splits: []
    excel_metric_id: "gc_survival_distant_pct"
    synonyms:
      - "metastatic survival"
      - "5-year survival metastatic gastric"

  # ─── Patient flow cascade (LOT) ──────────────────────────────
  - id: resected_curative
    label: "Resected / Curative Intent (%)"
    required: false
    splits: ["by_line"]
    excel_metric_id: "gc_lot_resected_pct"
    synonyms:
      - "resected gastric"
      - "curative resection"
      - "surgical resection"
      - "D2 gastrectomy"
      - "localized resectable"
      - "perioperative chemotherapy"
  - id: metastatic_first_line
    label: "Metastatic 1L (%)"
    required: false
    splits: ["by_line"]
    excel_metric_id: "gc_lot_1l_pct"
    synonyms:
      - "metastatic first line"
      - "metastatic 1L"
      - "first line gastric"
      - "FOLFOX nivolumab"
      - "pembrolizumab plus chemo"
      - "1L gastric"
  - id: second_line
    label: "2L (%)"
    required: false
    splits: ["by_line"]
    excel_metric_id: "gc_lot_2l_pct"
    synonyms:
      - "second line gastric"
      - "2L gastric"
      - "ramucirumab"
      - "paclitaxel ramucirumab"
  - id: third_line_plus
    label: "3L+ / BSC (%)"
    required: false
    splits: ["by_line"]
    excel_metric_id: "gc_lot_3lplus_pct"
    synonyms:
      - "third line gastric"
      - "3L+"
      - "best supportive care gastric"
      - "late line gastric"
      - "trastuzumab deruxtecan"

  # ─── Biomarkers ──────────────────────────────────────────────
  - id: her2_positive
    label: "HER2 Positive (%)"
    required: false
    splits: []
    excel_metric_id: "gc_her2_positive_pct"
    synonyms:
      - "HER2 positive"
      - "HER2+"
      - "HER2 overexpression"
      - "ERBB2 positive"
      - "HER2 amplified gastric"
  - id: pdl1_positive
    label: "PD-L1 CPS ≥1 (%)"
    required: false
    splits: []
    excel_metric_id: "gc_pdl1_positive_pct"
    synonyms:
      - "PD-L1 positive"
      - "PD-L1 CPS"
      - "PD-L1 expression"
      - "PDL1 CPS ≥1"
      - "CPS positive"

  # ─── Disease course ──────────────────────────────────────────
  - id: disease_localized_pct
    label: "Localized / Resectable Disease (%)"
    required: false
    splits: []
    excel_metric_id: "gc_disease_localized_pct"
    synonyms:
      - "localized gastric"
      - "resectable gastric cancer"
      - "early gastric cancer"
  - id: disease_metastatic_pct
    label: "Metastatic / Unresectable Disease (%)"
    required: false
    splits: []
    excel_metric_id: "gc_disease_metastatic_pct"
    synonyms:
      - "metastatic gastric"
      - "unresectable gastric"
      - "advanced gastric cancer"

year_range:
  min: 2015
  max: 2029

geography: "US"

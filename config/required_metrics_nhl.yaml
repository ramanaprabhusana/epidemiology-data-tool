# Required epidemiology metrics for Non-Hodgkin Lymphoma (NHL)
# SCOPE: All NHL subtypes including DLBCL. Use SEER all-NHL totals and subtype
#   breakdowns directly; do not subtract DLBCL from NHL totals. Document sources
#   (SEER*Stat, NHL Facts & Figures, registry reports) in evidence rows.
#
# DLBCL is not a standalone indication; it appears as subtype_dlbcl below.
# Aligns with InsightACE Epidemiology Beta and project scope.

indication: "Non-Hodgkin Lymphoma"

metrics:
  # --- Core epidemiology ---
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k)"
    required: true
    splits: []
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []
  - id: male_female_ratio
    label: "Male:Female Ratio"
    required: true
    splits: []

  # --- Stage distribution (Ann Arbor) ---
  - id: stage_i
    label: "Stage I (%)"
    required: true
    splits: []
  - id: stage_ii
    label: "Stage II (%)"
    required: true
    splits: []
  - id: stage_iii
    label: "Stage III (%)"
    required: true
    splits: []
  - id: stage_iv
    label: "Stage IV (%)"
    required: true
    splits: []

  # Subtype mix as % of all NHL (sums approximately to 100% with DLBCL included).
  - id: subtype_dlbcl
    label: "Diffuse Large B-Cell Lymphoma (DLBCL) - % of NHL"
    required: false
    splits: []
  - id: subtype_follicular
    label: "Follicular Lymphoma (FL) - % of NHL"
    required: false
    splits: []
  - id: subtype_mantle_cell
    label: "Mantle Cell Lymphoma (MCL) - % of NHL"
    required: false
    splits: []
  - id: subtype_marginal_zone
    label: "Marginal Zone Lymphoma (MZL) - % of NHL"
    required: false
    splits: []
  - id: subtype_small_lymphocytic
    label: "Small Lymphocytic Lymphoma (SLL) - % of NHL"
    required: false
    splits: []
  - id: subtype_burkitt
    label: "Burkitt Lymphoma - % of NHL"
    required: false
    splits: []
  - id: subtype_tcell_peripheral
    label: "Peripheral T-cell Lymphoma (PTCL) - % of NHL"
    required: false
    splits: []
  - id: subtype_tcell_cutaneous
    label: "Cutaneous T-cell Lymphoma (CTCL / MF-SS) - % of NHL"
    required: false
    splits: []
  - id: subtype_other
    label: "Other NHL subtypes - % of NHL"
    required: false
    splits: []

  # --- Treatment lines (subtype-weighted) ---
  - id: indolent_watch
    label: "Indolent watch-and-wait (FL/MZL low-burden)"
    required: false
    splits: []
  - id: first_line_aggressive
    label: "1L aggressive - R-CHOP (DLBCL, transformed FL, other aggressive B-cell)"
    required: false
    splits: ["by_line"]
  - id: first_line_indolent
    label: "1L indolent - BR / R2 / obinutuzumab-based (FL, MZL)"
    required: false
    splits: ["by_line"]
  - id: first_line_mcl
    label: "1L MCL - R-CHOP/R-DHAP + ASCT, or ibrutinib-based"
    required: false
    splits: ["by_line"]
  - id: relapsed_refractory
    label: "Relapsed/refractory (r/r) across subtypes"
    required: false
    splits: ["by_line"]
  - id: third_line_plus
    label: "3L+ including CAR-T (axi-cel, liso-cel, brexu-cel for MCL) and bispecifics"
    required: false
    splits: ["by_line"]

year_range:
  min: 2015
  max: 2029

geography: "US"

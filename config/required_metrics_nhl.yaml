# Required epidemiology metrics for Non-Hodgkin Lymphoma (NHL)
# SCOPE: All NHL subtypes including DLBCL. Use SEER all-NHL totals and subtype
#   breakdowns directly; do not subtract DLBCL from NHL totals. Document sources
#   (SEER*Stat, NHL Facts & Figures, registry reports) in evidence rows.
#
# DLBCL is not a standalone indication; it appears as subtype_dlbcl below.
# Aligns with InsightACE Epidemiology Beta + Excel v6 one-stop model.
# Updated 2026-04-29: added all proportion/cascade/age metrics
# that drive the NonHodgkin Forecast sheet IFERROR(INDEX/MATCH) formulas.

indication: "Non-Hodgkin Lymphoma"

metrics:
  # ─── Core epidemiology (required) ───────────────────────────
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k)"
    required: true
    splits: []
  - id: mortality_rate_aapc
    label: "Mortality Rate AAPC"
    required: true
    splits: []
    synonyms:
      - "mortality annual percent change"
      - "mortality APC"
      - "mortality trend"
      - "joinpoint mortality"
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []
  - id: male_female_ratio
    label: "Male:Female Ratio"
    required: true
    splits: []

  # ─── Stage distribution (Ann Arbor) ──────────────────────────
  - id: stage_i_pct
    label: "Stage I (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "nhl_stage_i_pct"
    evidence_ids:
      - "stage_localized_pct"
      - "stage_localized_2017"
    synonyms:
      - "stage I"
      - "stage 1"
      - "Ann Arbor stage I"
      - "stage I NHL"
      - "limited stage NHL"
  - id: stage_ii_pct
    label: "Stage II (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "nhl_stage_ii_pct"
    evidence_ids:
      - "stage_regional_pct"
      - "stage_regional_2017"
    synonyms:
      - "stage II"
      - "stage 2"
      - "Ann Arbor stage II"
      - "stage II NHL"
  - id: stage_iii_pct
    label: "Stage III (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "nhl_stage_iii_pct"
    evidence_ids:
      - "stage_distant_2017"
    synonyms:
      - "stage III"
      - "stage 3"
      - "Ann Arbor stage III"
      - "locally advanced NHL"
  - id: stage_iv_pct
    label: "Stage IV (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "nhl_stage_iv_pct"
    evidence_ids:
      - "stage_distant_pct"
      - "stage_distant_2013"
    synonyms:
      - "stage IV"
      - "stage 4"
      - "Ann Arbor stage IV"
      - "advanced NHL"
      - "disseminated NHL"

  # ─── Age distribution ────────────────────────────────────────
  - id: age_lt65_pct
    label: "Age <65 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "nhl_age_lt65_pct"
    evidence_ids:
      - "age_distribution_20to34"
      - "age_distribution_35to44"
    synonyms:
      - "younger than 65"
      - "under 65"
      - "age less than 65"
      - "<65 years old"
  - id: age_65_74_pct
    label: "Age 65-74 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "nhl_age_65_74_pct"
    evidence_ids:
      - "age_distribution_65to74"
    synonyms:

      - "age 65-74"
      - "elderly 65-74"
  - id: age_75plus_pct
    label: "Age 75+ years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "nhl_age_75plus_pct"
    evidence_ids:
      - "age_distribution_75to84"
    synonyms:
      - "75 and older"
      - "age 75+"
      - "very elderly"
      - "elderly 75+"

  # ─── Subtype mix (% of all NHL) ──────────────────────────────
  - id: subtype_dlbcl
    label: "DLBCL - % of NHL"
    required: false

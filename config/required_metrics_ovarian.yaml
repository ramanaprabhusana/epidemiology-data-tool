  # ─── Biomarkers / genetics ───────────────────────────────────
  - id: brca_mutation_rate
    label: "BRCA1/2 Mutation (%)"
    required: false
    splits: []
    excel_metric_id: "ov_s2_brca_mut_pct"
    evidence_ids:

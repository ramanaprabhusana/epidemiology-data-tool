# Required epidemiology metrics for Ovarian Cancer (high-grade serous + all histologies)
# Aligns with InsightACE Epidemiology Beta + Excel v6 one-stop model.
# Updated 2026-04-29: added all proportion/cascade/age metrics
# that drive the Ovarian Forecast sheet IFERROR(INDEX/MATCH) formulas.

indication: "Ovarian"

metrics:
  # ─── Core epidemiology (female only, required) ───────────────
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k, female)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k, female)"
    required: true
    splits: []
  - id: mortality_rate_aapc
    label: "Mortality Rate AAPC"
    required: true
    splits: []
    synonyms:
      - "mortality annual percent change"
      - "mortality APC"
      - "mortality trend"
      - "joinpoint mortality"
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []

  # ─── Stage distribution (FIGO / SEER Summary Stage) ──────────
  - id: stage_localized
    label: "Localized (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "ov_s2_total_pct"
    evidence_ids:
      - "stage_localized_pct"
      - "stage_localized_2017"
    synonyms:
      - "localized ovarian"
      - "FIGO stage I"
      - "FIGO I"
      - "organ-confined ovarian"
      - "SEER local ovarian"
  - id: stage_regional
    label: "Regional (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "ov_stage_iii_pct"
    evidence_ids:
      - "stage_regional_pct"
      - "stage_regional_2017"
    synonyms:
      - "regional ovarian"
      - "FIGO stage II"
      - "FIGO II"
      - "regional spread ovarian"
      - "SEER regional ovarian"
  - id: stage_distant
    label: "Distant / Metastatic (%)"
    required: false
    splits: ["by_stage"]
    excel_metric_id: "ov_stage_iv_pct"
    evidence_ids:
      - "stage_distant_pct"
      - "stage_distant_2017"
    synonyms:
      - "distant ovarian"
      - "FIGO stage III"
      - "FIGO stage IV"
      - "FIGO III-IV"
      - "advanced ovarian cancer"
      - "metastatic ovarian"
      - "SEER distant ovarian"

  # ─── Age distribution ────────────────────────────────────────
  - id: age_lt65_pct
    label: "Age <65 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "ov_age_lt65_pct"
    evidence_ids:
      - "age_distribution_20to34"
      - "age_distribution_35to44"
    synonyms:
      - "younger than 65"
      - "under 65"
      - "age less than 65"
      - "<65 years old"
  - id: age_65_74_pct
    label: "Age 65-74 years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "ov_age_65_74_pct"
    evidence_ids:
      - "age_distribution_65to74"
    synonyms:
      - "65 to 74 years"
      - "age 65-74"
      - "elderly 65-74"
  - id: age_75plus_pct
    label: "Age 75+ years (%)"
    required: false
    splits: ["by_age"]
    excel_metric_id: "ov_age_75plus_pct"
    evidence_ids:
      - "age_distribution_75to84"
    synonyms:
      - "75 and older"
      - "age 75+"
      - "very elderly"
      - "elderly 75+"

  # ─── Stage-specific survival ─────────────────────────────────
  - id: survival_localized
    label: "5-year survival - Localized (%)"
    required: false
    splits: []
    excel_metric_id: "oc_survival_localized_pct"
    synonyms:
      - "localized survival ovarian"
      - "early stage survival ovarian"
      - "FIGO I survival"
  - id: survival_distant

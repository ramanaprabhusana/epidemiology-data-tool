# Required epidemiology metrics for Ovarian Cancer (high-grade serous + all histologies)
# Aligns with InsightACE Epidemiology Beta and project scope.
# Generated: 2026-04-15 as part of multi-indication Data Pipeline extension.

indication: "Ovarian"

metrics:
  # ─── Core epidemiology (female only) ───
  - id: incidence
    label: "Incidence"
    required: true
    splits: []
  - id: incidence_rate
    label: "Incidence Rate (per 100k, female)"
    required: true
    splits: []
  - id: prevalence
    label: "Prevalence"
    required: true
    splits: []
  - id: mortality
    label: "Mortality"
    required: true
    splits: []
  - id: mortality_rate
    label: "Mortality Rate (per 100k, female)"
    required: true
    splits: []
  - id: five_year_survival
    label: "5-Year Survival Rate (%)"
    required: true
    splits: []
  - id: median_age_at_diagnosis
    label: "Median Age at Diagnosis"
    required: true
    splits: []

  # ─── Stage distribution (FIGO / SEER Summary Stage) ───
  - id: stage_localized
    label: "Localized (%)"
    required: true
    splits: []
  - id: stage_regional
    label: "Regional (%)"
    required: true
    splits: []
  - id: stage_distant
    label: "Distant / Metastatic (%)"
    required: true
    splits: []

  # ─── Stage-specific survival ───
  - id: survival_localized
    label: "5-year survival - Localized (%)"
    required: false
    splits: []
  - id: survival_distant
    label: "5-year survival - Distant (%)"
    required: false
    splits: []

  # ─── Treatment cascade ───
  - id: post_debulking_first_line
    label: "1L Post-debulking (Carbo/Paclitaxel ± Bev)"
    required: false
    splits: ["by_line"]
  - id: parp_maintenance
    label: "1L PARP maintenance (Olaparib / Niraparib)"
    required: false
    splits: ["by_line"]
  - id: platinum_sensitive_2l
    label: "Platinum-sensitive 2L"
    required: false
    splits: ["by_line"]
  - id: platinum_resistant
    label: "Platinum-resistant"
    required: false
    splits: ["by_line"]
  - id: fourth_line_plus
    label: "4L+ / BSC"
    required: false
    splits: ["by_line"]

  # ─── Biomarkers / genetics ───
  - id: brca_mutation_rate
    label: "BRCA1/2 mutation (%)"
    required: false
    splits: []
  - id: hrd_positive
    label: "HRD positive (%)"
    required: false
    splits: []

  # ─── Subtypes (histology) ───
  - id: histology_serous
    label: "High-grade serous (%)"
    required: false
    splits: []
  - id: histology_clear_cell
    label: "Clear cell carcinoma (%)"
    required: false
    splits: []

year_range:
  min: 2015
  max: 2029

geography: "US"

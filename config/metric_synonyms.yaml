# Metric Synonyms for Semantic Matching
# Maps metric_id → list of synonyms that may appear in literature/source documents
# Used by src/pipeline/semantic_matcher.py to resolve raw extracted metric names
# to canonical metric IDs without exact string matching.
#
# Why needed: Source documents use varied terminology
#   e.g., "IGHV mutational status: mutated 55%" ≠ exact match for "ighv_mutated_pct"
# Strategy: Try synonym expansion first (fast), embeddings as fallback (optional).
#
# Updated: 2026-04-28


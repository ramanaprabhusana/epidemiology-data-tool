# Exhaustive secondary-research source list: registries, journals, guidelines, dashboards, commercial.
# The tool explores ALL sources below for your indication and country. Add/remove entries as needed.
#
# type: link = stub with source_url (placeholders: {indication}, {country}, {indication_encoded}, {country_encoded})
# type: api  = live search (connector_id: clinicaltrials, pubmed). enabled_when: use_pubmed for PubMed only.
# extract_priority: 1 = run deep-dive first (before time cap), 2 = next, default 99. Lower = earlier.

sources:
  # --- Global cancer & epidemiology (IARC, WHO) ---
  - id: globocan
    name: IARC GLOBOCAN
    tier: gold
    type: link
    extract_priority: 1
    url: "https://gco.iarc.who.int/today/en/dataviz"
    metric: incidence_links
    value: "Search GLOBOCAN for incidence/mortality by country"
    definition: "Global Cancer Observatory – incidence, mortality, prevalence by cancer site and country"
    notes: "Select cancer type and country for estimates."

  - id: ci5
    name: IARC CI5
    tier: gold
    type: link
    extract_priority: 1
    url: "https://ci5.iarc.who.int/ci5-xii/tables"
    metric: registry_links
    value: "CI5 registry tables by cancer site and region"
    definition: "Cancer Incidence in Five Continents – registry-level data"
    notes: "Browse by cancer site (ICD-10) and registry/country."

  - id: who_gho
    name: WHO GHO
    tier: silver
    type: link
    extract_priority: 1
    url: "https://www.who.int/data/gho/data/indicators"
    metric: who_gho
    value: "WHO Global Health Observatory indicators"
    definition: "WHO health data by indicator and country"
    notes: "Search indicators; filter by country."

  - id: who_data_hub
    name: WHO Data Hub
    tier: silver
    type: link
    extract_priority: 1
    url: "https://data.who.int"
    metric: who_data_hub
    value: "WHO World Health Data Hub"
    definition: "Unified WHO data portal"
    notes: "Browse or search datasets by topic and geography."

  - id: who_iris
    name: WHO IRIS
    tier: silver
    type: link
    extract_priority: 1
    url: "https://iris.who.int"
    metric: who_iris
    value: "WHO institutional repository (reports, guidelines)"
    definition: "WHO publications and technical documents"
    notes: "Search by disease or topic."

  # --- Guidelines & clinical (NCCN, NICE, ASCO, ESMO) ---
  - id: nccn
    name: NCCN
    tier: gold
    type: link
    extract_priority: 1
    url: "https://www.nccn.org/guidelines/guidelines-detail?search={indication_encoded}"
    metric: nccn_guidelines
    value: "NCCN Clinical Practice Guidelines"
    definition: "National Comprehensive Cancer Network – evidence-based guidelines"
    notes: "Search for indication-specific guidelines and epidemiology references."

  - id: nccn_home
    name: NCCN Guidelines
    tier: gold
    type: link

# Options for the UI: indications and countries.
# Indications are discovered from config/required_metrics_*.yaml; this list controls order and display.
# Add or remove countries as needed for the pipeline.

indications:
  - id: cll
    label: "CLL (Chronic Lymphocytic Leukemia)"
    config_suffix: "cll"
  - id: hodgkin
    label: "Hodgkin Lymphoma"
    config_suffix: "hodgkin"
  - id: nhl
    label: "Non-Hodgkin Lymphoma (NHL)"
    config_suffix: "nhl"
  - id: gastric
    label: "Gastric Cancer (GC)"
    config_suffix: "gc"
  - id: ovarian
    label: "Ovarian Cancer"
    config_suffix: "ovarian"
  - id: prostate
    label: "Prostate Cancer"
    config_suffix: "prostate"
  - id: OTHER
    label: "Other (specify below)"
    config_suffix: ""

# Countries/geographies the pipeline supports (evidence can be filtered or tagged by country).
countries:
  - id: US
    label: "United States"
  - id: DE
    label: "Germany"
  - id: FR
    label: "France"
  - id: UK
    label: "United Kingdom"
  - id: CA
    label: "Canada"
  - id: JP
    label: "Japan"
  - id: CN
    label: "China"
  - id: OTHER
    label: "Other (specify below)"
